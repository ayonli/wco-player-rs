[package]
name = "wco"
version = "0.1.0"
edition = "2021"

[dependencies]
scraper = "0.20"
reqwest = { version = "0.12", features = ["json", "multipart", "stream"] }
tokio = { version = "1", features = ["full"], optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
url = "2.5"
regex = "1.11"
urlencoding = "2.1"
futures-util = "0.3"
