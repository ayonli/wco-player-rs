[application]
name = "WcoPlayer"
default_platform = "desktop"

[bundle]
identifier = "com.wco-player.app"
publisher = "ayon.li"
# Icons for different platforms
# macOS uses .icns, Windows uses .ico, Linux uses .png
icon = [
    "./icons/icon.icns",     # macOS
    "./icons/icon.ico",      # Windows
    "./icons/icon_1024.png", # Linux (and fallback)
    "./icons/icon_512.png",
    "./icons/icon_256.png",
    "./icons/icon_128.png",
    "./icons/icon_64.png",
    "./icons/icon_32.png",
    "./icons/icon_16.png",
]

[bundle.deb]
# These packages will be automatically installed by the user's package manager
depends = [
    "gstreamer1.0-plugins-bad",
    "gstreamer1.0-plugins-ugly",
    "gstreamer1.0-libav",
]

[bundle.rpm]
depends = [
    "gstreamer1-plugins-bad-free",
    "gstreamer1-plugins-ugly-free",
    "gstreamer1-plugin-libav",
]

[bundle.arch]
depends = ["gst-plugins-bad", "gst-plugins-ugly", "gst-libav"]
