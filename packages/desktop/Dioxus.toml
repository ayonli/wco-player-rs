[application]
name = "WcoPlayer"
default_platform = "desktop"

[bundle]
identifier = "com.wco-player.app"
publisher = "ayon.li"
# Icons for different platforms
# macOS uses .icns, Windows uses .ico, Linux uses .png
icon = [
    "./assets/icon.icns", # macOS
    "./assets/icon.png",  # Linux (and fallback)
    "./assets/icon.ico",  # Windows
]

[bundle.deb]
# These packages will be automatically installed by the user's package manager
depends = [
    "gstreamer1.0-plugins-bad",
    "gstreamer1.0-plugins-ugly",
    "gstreamer1.0-libav",
]

[bundle.rpm]
depends = [
    "gstreamer1-plugins-bad-free",
    "gstreamer1-plugins-ugly-free",
    "gstreamer1-plugin-libav",
]

[bundle.arch]
depends = ["gst-plugins-bad", "gst-plugins-ugly", "gst-libav"]
