[package]
name = "desktop"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[dependencies]
dioxus = { workspace = true, features = ["router", "desktop"] }
web = { workspace = true, features = ["desktop"] }

[features]
default = []
desktop = ["dioxus/desktop"]
server = ["dioxus/server"]

[[bin]]
name = "WcoPlayer"   # This will be the name of the executable and bundle
path = "src/main.rs"
