[package]
name = "mobile"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[dependencies]
dioxus = { workspace = true, features = ["router", "mobile"] }
web = { workspace = true, features = ["mobile"] }

[build-dependencies]
build-utils = { path = "../../build-utils" }

[features]
default = []
mobile = ["dioxus/mobile", "web/mobile"]
server = ["dioxus/server"]

[[bin]]
name = "WcoPlayer"   # This will be the name of the executable and bundle
path = "src/main.rs"
