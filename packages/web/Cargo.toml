[package]
name = "web"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[dependencies]
dioxus = { workspace = true, features = ["router", "fullstack"] }
ui = { workspace = true }
dioxus-use-js = "0.4"

[build-dependencies]
build-utils = { path = "../../build-utils" }

[features]
default = []
web = ["dioxus/web"]
server = ["dioxus/server", "ui/server"]
