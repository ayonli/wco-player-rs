[package]
name = "web"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[dependencies]
dioxus = { workspace = true, features = ["router", "fullstack"] }
api = { workspace = true }
ui = { workspace = true }
wco = { workspace = true }
tokio = { version = "1", features = ["full"], optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
urlencoding = "2"
dioxus-use-js = "0.4"
async-trait = "0.1"
axum = { version = "0.8", optional = true }
getrandom = { version = "0.3", features = ["wasm_js"] }
serde_qs = "0.15.0"
tower-http = { version = "0.6", features = ["cors"] }

[build-dependencies]
build-utils = { path = "../../build-utils" }

[features]
default = []
web = ["dioxus/web"]
desktop = ["dioxus/desktop", "dep:tokio", "dep:axum", "reqwest/stream"]
mobile = ["dioxus/mobile", "dep:tokio", "dep:axum", "reqwest/stream"]
server = [
    "dioxus/server",
    "api/server",
    "dep:tokio",
    "dep:axum",
    "reqwest/stream",
]

[profile.release]
opt-level = 3
lto = "thin"          # "thin" is much faster than "fat" LTO
codegen-units = 16    # Increasing this speeds up builds but slightly reduces optimization
panic = "abort"       # Reduces binary size and build time
